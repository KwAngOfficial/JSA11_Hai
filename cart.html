<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn | Azon Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container { max-width: 900px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .cart-item { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid #eee; }
        
        /* Hiển thị hình ảnh tại vị trí khoanh đỏ */
        .cart-item img { width: 90px; height: 90px; object-fit: contain; background: #f9f9f9; padding: 5px; border-radius: 10px; }
        
        .item-info { flex: 1; }
        .item-info h4 { margin: 0 0 5px 0; color: #2c3e50; }
        .item-price { color: #e67e22; font-weight: bold; }
        
        .quantity-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .quantity-btn { width: 25px; height: 25px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; }
        
        .cart-summary { margin-top: 30px; text-align: right; padding: 20px; background: #f8f9fa; border-radius: 10px; }
        .total-price { font-size: 24px; color: #c0392b; font-weight: bold; }
        .btn-checkout { background: #27ae60; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; width: 100%; transition: 0.3s; }
        .btn-checkout:hover { background: #219150; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">Azon<span>Shop</span></a>
            <h2>Giỏ hàng (<span id="count-header">0</span>)</h2>
        </div>
    </header>

    <div class="cart-container">
        <div id="cart-list">
            </div>

        <div id="cart-footer" style="display: none;">
            <div class="cart-summary">
                <p>Tổng tiền thanh toán:</p>
                <div class="total-price" id="total-price">$0.00</div>
            </div>
            <button class="btn-checkout" onclick="processCheckout()">XÁC NHẬN THANH TOÁN</button>
        </div>
    </div>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartList = document.getElementById('cart-list');
            const cartFooter = document.getElementById('cart-footer');
            const countHeader = document.getElementById('count-header');

            countHeader.innerText = cart.reduce((total, item) => total + item.quantity, 0);

            if (cart.length === 0) {
                cartList.innerHTML = '<div style="text-align:center; padding: 50px;"><i class="fas fa-shopping-basket" style="font-size: 50px; color:#ddd;"></i><p>Giỏ hàng đang trống!</p></div>';
                cartFooter.style.display = 'none';
                return;
            }

            cartFooter.style.display = 'block';
            let totalPrice = 0;

            cartList.innerHTML = cart.map(item => {
                totalPrice += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <div class="item-price">$${item.price.toFixed(2)}</div>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <button onclick="removeItem(${item.id})" style="color:#e74c3c; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i> Xóa</button>
                    </div>
                `;
            }).join('');

            document.getElementById('total-price').innerText = `$${totalPrice.toFixed(2)}`;
        }

        function updateQty(id, change) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) return removeItem(id);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
            }
        }

        function removeItem(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function processCheckout() {
            alert(" Đơn hàng của bạn đã được tiếp nhận! Cảm ơn bạn đã mua sắm tại Azon Shop.");
            localStorage.removeItem('cart');
            window.location.href = 'ship.html';
        }

        renderCart();
    </script>
</body>
</html>
