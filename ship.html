<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Giao Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .checkout-container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .btn-checkout { background-color: #3498db; color: white; font-weight: bold; border: none; }
        .btn-checkout:hover { background-color:#3498db ; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="checkout-container">
        <h2 class="mb-4 text-center">Thông Tin Giao Hàng</h2>
        <form id="delivery-form" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="fullName" class="form-label">Họ và tên</label>
                <input type="text" class="form-control" id="fullName" placeholder="ABC" required>
                <div class="invalid-feedback">Vui lòng nhập họ tên.</div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Số điện thoại</label>
                <input type="tel" class="form-control" id="phone" placeholder="0123456789" required pattern="[0-9]{10}">
                <div class="invalid-feedback">Vui lòng nhập số điện thoại hợp lệ (10 chữ số).</div>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Địa chỉ nhận hàng</label>
                <textarea class="form-control" id="address" rows="3" placeholder="Số nhà, tên đường, phường/xã, quận/huyện..." required></textarea>
                <div class="invalid-feedback">Vui lòng cung cấp địa chỉ giao hàng.</div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="city" class="form-label">Tỉnh/Thành phố</label>
                    <select class="form-select" id="city" required>
                        <option value="">Chọn...</option>
                        <option value="hanoi">Hà Nội</option>
                        <option value="bacninh">Bắc Ninh</option>
                        <option value="hcm">TP. Hồ Chí Minh</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="zip" class="form-label">Ghi chú (Tùy chọn)</label>
                    <input type="text" class="form-control" id="note">
                </div>
            </div>

            <hr class="my-4">

            <h5 class="mb-3">Phương thức thanh toán</h5>
            <div class="form-check">
                <input id="cod" name="paymentMethod" type="radio" class="form-check-input" checked required>
                <label class="form-check-label" for="cod">Thanh toán khi nhận hàng (COD)</label>
            </div>
            <div class="form-check">
                <input id="bank" name="paymentMethod" type="radio" class="form-check-input" required>
                <label class="form-check-label" for="bank">Chuyển khoản ngân hàng</label>
            </div>

            <button class="w-100 btn btn-checkout btn-lg mt-4" type="submit">Xác Nhận Đặt Hàng</button>
        </form>
    </div>
</div>

<script>
    // JavaScript để kiểm tra tính hợp lệ của Form (Bootstrap validation)
    (() => {
        'use strict'
        const form = document.getElementById('delivery-form')
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            } else {
                event.preventDefault()
                alert('Chúc mừng! Đơn hàng của bạn đã được ghi nhận.')
                window.location.href = 'index.html';
            }
            form.classList.add('was-validated')
        }, false)
        
    })()
</script>

</body>
</html>
