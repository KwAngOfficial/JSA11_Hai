<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập | Azon Shop</title>
    <link rel="stylesheet" href="auth-style.css">
</head>

<body>

    <div class="auth-container">
    <div class="auth-box">
        <div class="tab-header">
            <button type="button" id="tab-login" class="active" onclick="switchTab('login')">Đăng nhập</button>
            <button type="button" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <form id="login-form" class="auth-form">
            <h2>Đăng nhập</h2>
            <input type="text" id="user-login" placeholder="Tên đăng nhập" required>
            <input type="password" id="pass-login" placeholder="Mật khẩu" required>
            <p id="login-error" class="error-text"></p> 
            <button type="submit" class="btn-primary">Đăng nhập</button>
        </form>

        <form id="register-form" class="auth-form" style="display:none">
            <h2>Đăng ký tài khoản</h2>
            <input type="text" id="reg-user" placeholder="Tên đăng nhập mới" required>
            <input type="password" id="reg-pass" placeholder="Mật khẩu" required>
            <input type="password" id="reg-confirm" placeholder="Xác nhận mật khẩu" required>
            <p id="reg-error" class="error-text"></p>
            <button type="submit" class="btn-primary" style="background: #3498db;">Đăng ký ngay</button>
        </form>
    </div>
</div>

    <script src="auth-script.js"></script>
</body>

</html>
